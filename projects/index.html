<body>
  <iframe id="projectsFrame" src="/qilylean/home.html?build=20260721-speed-v2#projects" title="QilyLean代表项目矩阵"></iframe>
  <script>
  (function(){
    'use strict';
    var frame=document.getElementById('projectsFrame');
    function lockProjects(){
      try{
        var homeWindow=frame.contentWindow;
        if(!homeWindow)return;
        if(homeWindow.location.hash!=='#projects')homeWindow.location.hash='projects';
        var section=frame.contentDocument&&frame.contentDocument.getElementById('projects');
        if(section)section.scrollIntoView({block:'start'});
      }catch(error){console.error(error);}
    }
    frame.addEventListener('load',function(){
      lockProjects();
      setTimeout(lockProjects,600);
      setTimeout(lockProjects,1600);
    });
  })();
  </script>
