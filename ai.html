*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--paper);color:var(--ink)}
.top{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:12px clamp(18px,4vw,56px);background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:20}.brand{font-weight:900;color:var(--forest);white-space:nowrap}.site-nav{display:flex;flex-wrap:wrap;justify-content:flex-end;gap:7px}.site-nav a{padding:8px 10px;border:1px solid transparent;border-radius:10px;color:var(--muted);text-decoration:none;font-size:14px;font-weight:800;transition:transform .16s ease,color .16s ease,background .16s ease,border-color .16s ease,box-shadow .16s ease}.site-nav a:hover,.site-nav a:focus-visible{color:var(--forest);background:#eaf6f3;border-color:#b9d9d4;box-shadow:0 7px 18px rgba(15,75,90,.14);transform:translateY(-2px);outline:none}
.hero{padding:36px clamp(18px,6vw,80px);background:linear-gradient(125deg,#0f4b5a,#177f87);color:#fff}.hero .inner,.main{width:min(1080px,100%);margin:auto}.hero h1{margin:0 0 8px;font-size:clamp(34px,5vw,56px)}.hero p{margin:0;color:#e8f6f3;font-size:18px;line-height:1.7}
.main{padding:24px 18px 40px}.chat{background:#fff;border:1px solid var(--line);box-shadow:0 16px 44px rgba(15,75,90,.10);min-height:620px;display:flex;flex-direction:column}.messages{flex:1;padding:22px;overflow:auto;max-height:66vh}.msg{display:flex;margin:0 0 16px}.msg.user{justify-content:flex-end}.bubble{max-width:min(82%,760px);padding:13px 16px;border-radius:16px;white-space:pre-wrap;line-height:1.72}.assistant .bubble{background:#eef8f6;border:1px solid var(--line)}.user .bubble{background:var(--forest);color:#fff}.meta{font-size:12px;color:var(--muted);margin:4px 4px 0}
.quick{display:flex;gap:8px;flex-wrap:wrap;padding:0 22px 14px}.quick button{border:1px solid var(--line);background:#f8fbfa;color:var(--forest);border-radius:999px;padding:8px 12px;cursor:pointer}.quick button:hover,.quick button:focus-visible{background:#eaf6f3;border-color:#b9d9d4;outline:none}.composer{border-top:1px solid var(--line);padding:16px;display:grid;grid-template-columns:1fr auto;gap:10px}.composer textarea{width:100%;min-height:54px;max-height:180px;resize:vertical;border:1px solid var(--line);border-radius:12px;padding:13px 14px;font:inherit;line-height:1.5}.composer button{border:0;border-radius:12px;padding:0 20px;background:var(--forest);color:#fff;font-weight:850;cursor:pointer}.composer button:disabled{opacity:.55;cursor:not-allowed}.bar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:#f8fbfa;border-bottom:1px solid var(--line)}.status{font-size:13px;color:var(--muted)}.clear{border:0;background:transparent;color:var(--plum);cursor:pointer}.notice{padding:12px 16px;background:#fff9e8;border-top:1px solid #ead9a4;color:#6a5724;font-size:13px;line-height:1.6}
@media(max-width:860px){.top{position:static;align-items:flex-start;flex-direction:column}.site-nav{justify-content:flex-start}}@media(max-width:640px){.messages{padding:16px}.bubble{max-width:92%}.composer{grid-template-columns:1fr}.composer button{min-height:46px}.chat{min-height:70vh}}
</style>
