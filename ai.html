<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QilyLean AI｜制造改善自由对话</title>
<meta name="description" content="QilyLean制造改善AI顾问，支持精益生产、IE、VSM、SMED、标准工时、PMC、MES、APS、ERP及工厂规划自由对话。">
<link rel="canonical" href="https://qilylean.com/ai.html">
<style>
:root{--ink:#163c45;--muted:#5f7474;--line:#d5e4e3;--paper:#eef7f5;--white:#fff;--teal:#177f87;--forest:#0f4b5a;--gold:#caa15f;--plum:#7d4a70}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:var(--paper);color:var(--ink)}
.top{display:flex;justify-content:space-between;align-items:center;gap:16px;padding:15px clamp(18px,5vw,64px);background:#fff;border-bottom:1px solid var(--line);position:sticky;top:0;z-index:5}.brand{font-weight:900;color:var(--forest)}.top a{color:var(--muted);text-decoration:none}
.hero{padding:36px clamp(18px,6vw,80px);background:linear-gradient(125deg,#0f4b5a,#177f87);color:#fff}.hero .inner,.main{width:min(1080px,100%);margin:auto}.hero h1{margin:0 0 8px;font-size:clamp(34px,5vw,56px)}.hero p{margin:0;color:#e8f6f3;font-size:18px;line-height:1.7}
.main{padding:24px 18px 40px}.chat{background:#fff;border:1px solid var(--line);box-shadow:0 16px 44px rgba(15,75,90,.10);min-height:620px;display:flex;flex-direction:column}.messages{flex:1;padding:22px;overflow:auto;max-height:66vh}.msg{display:flex;margin:0 0 16px}.msg.user{justify-content:flex-end}.bubble{max-width:min(82%,760px);padding:13px 16px;border-radius:16px;white-space:pre-wrap;line-height:1.72}.assistant .bubble{background:#eef8f6;border:1px solid var(--line)}.user .bubble{background:var(--forest);color:#fff}.meta{font-size:12px;color:var(--muted);margin:4px 4px 0}
.quick{display:flex;gap:8px;flex-wrap:wrap;padding:0 22px 14px}.quick button{border:1px solid var(--line);background:#f8fbfa;color:var(--forest);border-radius:999px;padding:8px 12px;cursor:pointer}.composer{border-top:1px solid var(--line);padding:16px;display:grid;grid-template-columns:1fr auto;gap:10px}.composer textarea{width:100%;min-height:54px;max-height:180px;resize:vertical;border:1px solid var(--line);border-radius:12px;padding:13px 14px;font:inherit;line-height:1.5}.composer button{border:0;border-radius:12px;padding:0 20px;background:var(--forest);color:#fff;font-weight:850;cursor:pointer}.composer button:disabled{opacity:.55;cursor:not-allowed}.bar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;background:#f8fbfa;border-bottom:1px solid var(--line)}.status{font-size:13px;color:var(--muted)}.clear{border:0;background:transparent;color:var(--plum);cursor:pointer}.notice{padding:12px 16px;background:#fff9e8;border-top:1px solid #ead9a4;color:#6a5724;font-size:13px;line-height:1.6}
@media(max-width:640px){.messages{padding:16px}.bubble{max-width:92%}.composer{grid-template-columns:1fr}.composer button{min-height:46px}.chat{min-height:70vh}}
</style>
</head>
<body>
<header class="top"><div class="brand">QilyLean AI</div><nav><a href="/">返回主页</a></nav></header>
<section class="hero"><div class="inner"><h1>制造改善自由对话</h1><p>围绕精益生产、工业工程、VSM、SMED、标准工时、PMC、MES、APS、ERP、工厂布局与汽车电子制造进行连续交流。</p></div></section>
<main class="main">
<section class="chat" aria-label="QilyLean AI对话区">
<div class="bar"><span class="status" id="status">准备就绪</span><button class="clear" id="clearBtn" type="button">清空会话</button></div>
<div class="messages" id="messages"></div>
<div class="quick" id="quick">
<button type="button">如何开展VSM现状诊断？</button><button type="button">标准工时如何接入APS？</button><button type="button">SMED改善从哪里开始？</button><button type="button">汽车电子装配适合单件流吗？</button>
</div>
<form class="composer" id="chatForm"><textarea id="question" maxlength="3000" placeholder="请输入任何制造改善问题，Shift+Enter换行，Enter发送。" required></textarea><button id="sendBtn" type="submit">发送</button></form>
<div class="notice">AI建议用于辅助分析，不替代现场测量、工程验证、法规判断或企业正式决策。涉及关键数据时，请补充产品、工序、节拍、人员、设备、质量与交付条件。</div>
</section>
</main>
<script src="/qilylean-ai.js?v=1"></script>
</body>
</html>
