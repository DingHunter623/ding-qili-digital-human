<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Times26001 思大时间管理应用概览</title>
  <desc id="desc">展示北京时间、万年历、闹钟提醒、秒表计时、倒计时和黄历功能的移动应用宣传图。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff7f5"/><stop offset="1" stop-color="#eef8f6"/></linearGradient>
    <linearGradient id="red" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ff6b62"/><stop offset="1" stop-color="#e6403b"/></linearGradient>
    <linearGradient id="teal" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0f4b5a"/><stop offset="1" stop-color="#178b94"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#123d46" flood-opacity=".18"/></filter>
  </defs>
  <rect width="1200" height="720" rx="40" fill="url(#bg)"/>
  <g transform="translate(70 64)">
    <rect width="142" height="142" rx="34" fill="url(#red)" filter="url(#shadow)"/>
    <circle cx="71" cy="72" r="45" fill="none" stroke="#fff" stroke-width="10"/>
    <path d="M71 43v31l23 13" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M71 18v12M71 114v12M17 72h12M113 72h12" stroke="#fff" stroke-width="7" stroke-linecap="round" opacity=".92"/>
  </g>
  <text x="242" y="112" fill="#0f4b5a" font-family="Arial Rounded MT Bold,Avenir Next,Segoe UI,sans-serif" font-size="58" font-weight="900">Times26001</text>
  <text x="244" y="166" fill="#4e6d70" font-family="PingFang SC,Microsoft YaHei,Noto Sans CJK SC,sans-serif" font-size="30" font-weight="800">思大时间管理 · 一站式移动时间工具</text>
  <g transform="translate(68 250)" filter="url(#shadow)">
    <rect width="470" height="398" rx="34" fill="#fff"/>
    <rect width="470" height="82" rx="34" fill="url(#teal)"/>
    <rect y="50" width="470" height="32" fill="url(#teal)"/>
    <text x="30" y="50" fill="#fff" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="25" font-weight="900">北京时间 · 万年历</text>
    <text x="235" y="162" text-anchor="middle" fill="#0f4b5a" font-family="Arial,Segoe UI,sans-serif" font-size="72" font-weight="900">21:26:48</text>
    <text x="235" y="205" text-anchor="middle" fill="#6a7e7f" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="22">2026年7月24日 · 农历六月十一</text>
    <g font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="19" font-weight="800">
      <rect x="30" y="240" width="126" height="58" rx="14" fill="#eef8f6"/><text x="93" y="276" text-anchor="middle" fill="#0f4b5a">闹钟提醒</text>
      <rect x="172" y="240" width="126" height="58" rx="14" fill="#fff2ef"/><text x="235" y="276" text-anchor="middle" fill="#b7423c">分段计时</text>
      <rect x="314" y="240" width="126" height="58" rx="14" fill="#fff8e4"/><text x="377" y="276" text-anchor="middle" fill="#80601e">黄历节气</text>
    </g>
    <rect x="30" y="326" width="410" height="44" rx="22" fill="#0f4b5a"/>
    <text x="235" y="355" text-anchor="middle" fill="#fff" font-family="PingFang SC,Microsoft YaHei,sans-serif" font-size="19" font-weight="900">离线提醒 · 数据复制 · 大字号显示</text>
  </g>
  <g transform="translate(585 250)" font-family="PingFang SC,Microsoft YaHei,Noto Sans CJK SC,sans-serif">
    <text x="0" y="22" fill="#0f4b5a" font-size="34" font-weight="900">为日常时间管理，也为IE现场测时</text>
    <g transform="translate(0 58)">
      <rect width="540" height="76" rx="18" fill="#fff" stroke="#d5e4e3"/>
      <circle cx="42" cy="38" r="22" fill="#e9f7f4"/><text x="42" y="46" text-anchor="middle" fill="#0f4b5a" font-size="23" font-weight="900">01</text>
      <text x="82" y="34" fill="#0f4b5a" font-size="23" font-weight="900">北京时间与万年历</text><text x="82" y="59" fill="#637b7c" font-size="17">阳历、农历、生肖、周次、节气、节假日、时辰</text>
    </g>
    <g transform="translate(0 148)">
      <rect width="540" height="76" rx="18" fill="#fff" stroke="#d5e4e3"/>
      <circle cx="42" cy="38" r="22" fill="#fff0ed"/><text x="42" y="46" text-anchor="middle" fill="#b7423c" font-size="23" font-weight="900">02</text>
      <text x="82" y="34" fill="#0f4b5a" font-size="23" font-weight="900">秒表、分段与倒计时</text><text x="82" y="59" fill="#637b7c" font-size="17">分段记录、总时长汇总、文本复制与结束提醒</text>
    </g>
    <g transform="translate(0 238)">
      <rect width="540" height="76" rx="18" fill="#fff" stroke="#d5e4e3"/>
      <circle cx="42" cy="38" r="22" fill="#fff8e4"/><text x="42" y="46" text-anchor="middle" fill="#80601e" font-size="23" font-weight="900">03</text>
      <text x="82" y="34" fill="#0f4b5a" font-size="23" font-weight="900">闹钟、提醒与黄历</text><text x="82" y="59" fill="#637b7c" font-size="17">重复规则、本地通知、宜忌、冲煞与节气信息</text>
    </g>
    <g transform="translate(0 328)">
      <rect width="540" height="70" rx="18" fill="url(#teal)"/>
      <text x="270" y="44" text-anchor="middle" fill="#fff" font-size="21" font-weight="900">Android / iOS · Vue 3 + Capacitor</text>
    </g>
  </g>
</svg>
