name: Fix daily insights full archive

on:
  push:
    paths:
      - '.github/workflows/fix-daily-insights-archive.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch daily archive loader
        run: |
          python - <<'PY'
          from pathlib import Path
          path=Path('qilylean/daily-insights.html')
          text=path.read_text(encoding='utf-8')
          text=text.replace('<script src="daily-2026-07-22.js?v=20260722-howdo-v2"></script>\n','')
          text=text.replace('<a href="#2026-07-19">最新简报</a>','<a href="#2026-07-22">最新简报</a>')
          marker='<script src="floating-service.js?v=20260720-floating-contact-share-v1"></script>'
          loader='<script src="daily-insights-archive.js?v=20260722-all-v2"></script>\n'
          if loader.strip() not in text:
              text=text.replace(marker,loader+marker)
          path.write_text(text,encoding='utf-8')
          PY
      - name: Commit archive fix
        run: |
          git config user.name 'QilyLean Publisher'
          git config user.email 'actions@users.noreply.github.com'
          git add qilylean/daily-insights.html
          git commit -m '修复每日工程版简报最新排序与全量目录关联'
          git push
