name: Index Times26001 page

on:
  push:
    branches: [main]
    paths:
      - "scripts/index-times26001.js"
      - ".github/workflows/index-times26001.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: index-times26001-main
  cancel-in-progress: false

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Index Times26001
        run: node scripts/index-times26001.js
      - name: Validate index entries
        shell: bash
        run: |
          grep -q "https://qilylean.com/tools/times26001/" sitemap.xml
          grep -q "'/tools/times26001/'" site-search.js
      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "Times26001 is already indexed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml site-search.js
          git commit -m "build: index Times26001 app page [skip ci]"
          git push
