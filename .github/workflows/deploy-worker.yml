name: 部署 QilyLean AI Worker

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare-worker/**"
      - "wrangler.toml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-qilylean-ai-worker
  cancel-in-progress: true

jobs:
  deploy:
    name: 部署到 Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: 安装依赖
        run: npm install

      - name: 校验 Cloudflare 账户 ID
        shell: bash
        env:
          RAW_CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          ACCOUNT_ID="$(printf '%s' "$RAW_CLOUDFLARE_ACCOUNT_ID" | grep -oE '[0-9a-fA-F]{32}' | head -n 1)"
          if [ "${#ACCOUNT_ID}" -ne 32 ]; then
            echo "Cloudflare 账户 ID 无效：应为 32 位十六进制字符串。"
            exit 1
          fi
          echo "CLOUDFLARE_ACCOUNT_ID=$ACCOUNT_ID" >> "$GITHUB_ENV"

      - name: 部署 Worker
        run: npm run deploy:worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
