name: 部署 QilyLean AI Worker

on:
  push:
    branches:
      - main
    paths:
      - "cloudflare-worker/**"
      - "wrangler.toml"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-qilylean-ai-worker
  cancel-in-progress: true

jobs:
  deploy:
    name: 部署到 Cloudflare Workers
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: 安装依赖
        run: npm install

      - name: 部署 Worker
        run: npm run deploy:worker
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
