name: Copy digital_human to qilylean

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Copy directory and switch references
        shell: bash
        run: |
          set -euo pipefail

          if [ ! -d "digital_human" ]; then
            echo "digital_human directory does not exist."
            exit 1
          fi

          # 避免旧的半成品目录干扰
          rm -rf qilylean

          # 完整复制，包括图片、视频、HTML、JS、JSON等文件
          cp -a digital_human qilylean

          python3 - <<'PY'
          from pathlib import Path

          root = Path(".")
          changed = []

          for path in root.rglob("*"):
              if not path.is_file():
                  continue

              # 保留旧目录原样，作为临时备用入口
              if ".git" in path.parts or "digital_human" in path.parts:
                  continue

              try:
                  original = path.read_text(encoding="utf-8")
              except (UnicodeDecodeError, OSError):
                  continue

              updated = original.replace(
                  "/digital_human/",
                  "/qilylean/"
              ).replace(
                  "digital_human/",
                  "qilylean/"
              )

              if updated != original:
                  path.write_text(updated, encoding="utf-8")
                  changed.append(str(path))

          print(f"Updated {len(changed)} text files:")
          for item in changed:
              print(item)
          PY

      - name: Commit migration
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet && git diff --cached --quiet; then
            echo "No changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Copy digital_human to qilylean and switch active references"
          git push origin HEAD:main
