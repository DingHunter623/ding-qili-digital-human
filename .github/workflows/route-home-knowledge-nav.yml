name: Route homepage knowledge navigation

on:
  push:
    paths:
      - '.github/workflows/route-home-knowledge-nav.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Route knowledge navigation to standalone URL
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
              Path('index.html'): [
                  ('https://qilylean.com/knowledge.html', 'https://qilylean.com/knowledge/'),
              ],
              Path('qilylean/home.html'): [
                  ('https://qilylean.com/knowledge.html', 'https://qilylean.com/knowledge/'),
              ],
              Path('qilylean/content-restore.js'): [
                  ("primary.href='/qilylean/lean-knowledge.html#daily-insights';", "primary.href='/knowledge/';"),
              ],
              Path('qilylean/knowledge-publish-fix-v1.js'): [
                  ("primary.setAttribute('href','/qilylean/lean-knowledge.html#daily-insights');", "primary.setAttribute('href','/knowledge/');"),
              ],
          }

          changed = []
          for path, pairs in replacements.items():
              text = path.read_text(encoding='utf-8')
              original = text
              for old, new in pairs:
                  text = text.replace(old, new)
              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed.append(str(path))

          if not changed:
              raise SystemExit('No matching navigation references found')
          print('\n'.join(changed))
          PY
      - name: Commit navigation fix
        run: |
          git config user.name 'QilyLean Publisher'
          git config user.email 'actions@users.noreply.github.com'
          git add index.html qilylean/home.html qilylean/content-restore.js qilylean/knowledge-publish-fix-v1.js
          git commit -m '首页知识分享导航统一进入独立网址'
          git push
