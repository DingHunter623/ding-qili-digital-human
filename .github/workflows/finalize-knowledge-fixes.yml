name: Finalize knowledge and 5W2H fixes

on:
  push:
    paths:
      - '.github/workflows/finalize-knowledge-fixes.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply cache and loader fixes
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          for path in Path('.').rglob('*.html'):
              try:
                  text=path.read_text(encoding='utf-8')
              except UnicodeDecodeError:
                  continue
              updated=re.sub(r'font-plus-one\.js\?v=[^"\']+', 'font-plus-one.js?v=20260722-dedupe-howdo-v3', text)
              if updated!=text:
                  path.write_text(updated,encoding='utf-8')

          daily=Path('qilylean/daily-insights.html')
          text=daily.read_text(encoding='utf-8')
          if 'daily-2026-07-22.js' not in text:
              text=text.replace('<script src="daily-2026-07-15.js"></script>', '<script src="daily-2026-07-22.js?v=20260722-howdo-v2"></script>\n<script src="daily-2026-07-15.js"></script>')
          else:
              text=re.sub(r'daily-2026-07-22\.js(?:\?v=[^"\']+)?', 'daily-2026-07-22.js?v=20260722-howdo-v2', text)
          daily.write_text(text,encoding='utf-8')

          lean=Path('qilylean/lean-knowledge.html')
          text=lean.read_text(encoding='utf-8')
          loader='<script src="knowledge-publish-fix-v1.js?v=20260722-dedupe-howdo-v3"></script>'
          if 'knowledge-publish-fix-v1.js' not in text:
              text=text.replace('<script src="floating-service.js', loader+'\n  <script src="floating-service.js')
          else:
              text=re.sub(r'knowledge-publish-fix-v1\.js\?v=[^"\']+', 'knowledge-publish-fix-v1.js?v=20260722-dedupe-howdo-v3', text)
          lean.write_text(text,encoding='utf-8')

          meta=Path('qilylean/site-meta.js')
          text=meta.read_text(encoding='utf-8')
          text=re.sub(r'knowledge-publish-fix-v1\.js\?v=[^"\']+', 'knowledge-publish-fix-v1.js?v=20260722-dedupe-howdo-v3', text)
          meta.write_text(text,encoding='utf-8')
          PY
      - name: Commit and push
        run: |
          git config user.name 'QilyLean Publisher'
          git config user.email 'actions@users.noreply.github.com'
          git add -A
          git commit -m '发布参考资料去重、简报导航去重与5W2H修正'
          git push
