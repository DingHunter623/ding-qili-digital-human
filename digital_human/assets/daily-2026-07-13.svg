<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-label="标准工时是数智化工厂的数据底座"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#f6fbfa"/><stop offset="1" stop-color="#dbeeed"/></linearGradient><linearGradient id="deep" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f4b5a"/><stop offset="1" stop-color="#177f87"/></linearGradient></defs><rect width="1200" height="1200" fill="url(#bg)"/><rect x="0" y="0" width="1200" height="150" fill="#0f4b5a"/><text x="70" y="92" fill="#ffe39b" font-size="42" font-weight="800">DAY006 · 每日工程版简报</text><text x="70" y="260" fill="#0f4b5a" font-size="72" font-weight="900">标准工时，</text><text x="70" y="350" fill="#0f4b5a" font-size="72" font-weight="900">才是排程可信的起点。</text><rect x="70" y="420" width="1060" height="180" rx="26" fill="url(#deep)"/><text x="600" y="500" fill="#ffffff" font-size="46" font-weight="800" text-anchor="middle">没有标准工时，APS只能排订单；</text><text x="600" y="565" fill="#ffe39b" font-size="46" font-weight="800" text-anchor="middle">有了标准工时，APS才能排产能。</text><g transform="translate(90 685)"><rect width="180" height="150" rx="22" fill="#ffffff" stroke="#caa15f" stroke-width="4"/><text x="90" y="62" text-anchor="middle" fill="#0f4b5a" font-size="36" font-weight="900">标准工时</text><text x="90" y="112" text-anchor="middle" fill="#5f7474" font-size="26">Time Study</text></g><g transform="translate(315 685)"><rect width="180" height="150" rx="22" fill="#ffffff" stroke="#caa15f" stroke-width="4"/><text x="90" y="62" text-anchor="middle" fill="#0f4b5a" font-size="36" font-weight="900">标准产能</text><text x="90" y="112" text-anchor="middle" fill="#5f7474" font-size="26">Capacity</text></g><g transform="translate(540 685)"><rect width="180" height="150" rx="22" fill="#ffffff" stroke="#caa15f" stroke-width="4"/><text x="90" y="62" text-anchor="middle" fill="#0f4b5a" font-size="36" font-weight="900">PMC排程</text><text x="90" y="112" text-anchor="middle" fill="#5f7474" font-size="26">Scheduling</text></g><g transform="translate(765 685)"><rect width="180" height="150" rx="22" fill="#ffffff" stroke="#caa15f" stroke-width="4"/><text x="90" y="62" text-anchor="middle" fill="#0f4b5a" font-size="36" font-weight="900">APS</text><text x="90" y="112" text-anchor="middle" fill="#5f7474" font-size="26">优化计算</text></g><g transform="translate(990 685)"><rect width="120" height="150" rx="22" fill="#ffffff" stroke="#caa15f" stroke-width="4"/><text x="60" y="62" text-anchor="middle" fill="#0f4b5a" font-size="34" font-weight="900">交付</text><text x="60" y="112" text-anchor="middle" fill="#5f7474" font-size="24">Delivery</text></g><path d="M270 760h45M495 760h45M720 760h45M945 760h45" stroke="#177f87" stroke-width="10" stroke-linecap="round"/><polygon points="310,748 330,760 310,772" fill="#177f87"/><polygon points="535,748 555,760 535,772" fill="#177f87"/><polygon points="760,748 780,760 760,772" fill="#177f87"/><polygon points="985,748 1005,760 985,772" fill="#177f87"/><rect x="70" y="905" width="1060" height="160" rx="20" fill="#ffffff" opacity="0.95"/><text x="600" y="970" fill="#0f4b5a" font-size="38" font-weight="800" text-anchor="middle">标准工时不是考核工具，而是制造运营的数据底座。</text><text x="600" y="1025" fill="#5f7474" font-size="30" text-anchor="middle">排程、报价、人力配置、产能评估与系统参数，都应建立在可信工时之上。</text><rect x="0" y="1120" width="1200" height="80" fill="#0f4b5a"/><text x="600" y="1172" fill="#ffffff" font-size="30" text-anchor="middle">制造改善知识分享 · 2026-07-13</text></svg>