<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-labelledby="title desc">
<title id="title">现场越忙，不代表交付越快</title><desc id="desc">精益物流通过客户需求、生产计划、超市拉动、配送补料和标准工位形成稳定生产节奏</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0f4b5a"/><stop offset="1" stop-color="#177f87"/></linearGradient></defs>
<rect width="1000" height="1000" rx="42" fill="url(#bg)"/>
<text x="68" y="82" fill="#ffe39b" font-size="34" font-weight="800">2026-07-17｜DAY010</text>
<text x="68" y="170" fill="#fff" font-size="60" font-weight="900">现场越忙</text>
<text x="68" y="240" fill="#fff" font-size="60" font-weight="900">不代表交付越快</text>
<text x="68" y="300" fill="#d8efeb" font-size="26">精益物流不是搬得更快，而是让物料按节拍到达正确位置</text>
<g transform="translate(95 365)">
<rect width="810" height="420" rx="28" fill="#f7fbfa"/>
<g stroke="#caa15f" stroke-width="8" stroke-linecap="round">
<line x1="405" y1="72" x2="405" y2="330"/>
</g>
<g font-size="28" font-weight="900" text-anchor="middle">
<rect x="250" y="30" width="310" height="64" rx="18" fill="#caa15f"/><text x="405" y="72" fill="#17322d">客户需求</text>
<rect x="250" y="120" width="310" height="64" rx="18" fill="#7d4a70"/><text x="405" y="162" fill="#fff">生产计划</text>
<rect x="250" y="210" width="310" height="64" rx="18" fill="#177f87"/><text x="405" y="252" fill="#fff">超市拉动 / 配送补料</text>
<rect x="250" y="300" width="310" height="64" rx="18" fill="#0f4b5a"/><text x="405" y="342" fill="#fff">标准工位 / 稳定生产</text>
</g>
<g fill="#0f4b5a" font-size="24" font-weight="850">
<text x="40" y="120">按需拉动</text><text x="40" y="175">缩短路径</text><text x="40" y="230">降低WIP</text><text x="40" y="285">减少等待</text>
<text x="610" y="120">正确时间</text><text x="610" y="175">正确数量</text><text x="610" y="230">正确位置</text><text x="610" y="285">稳定节拍</text>
</g>
<text x="405" y="400" fill="#0f4b5a" font-size="31" font-weight="900" text-anchor="middle">让物料流、信息流与生产节拍保持一致</text>
</g>
<text x="500" y="880" fill="#fff" font-size="32" font-weight="850" text-anchor="middle">真正高效的工厂，不是物料跑得快，而是物料不用到处跑。</text>
<text x="500" y="942" fill="#d8efeb" font-size="23" font-weight="800" text-anchor="middle">DAILY ENGINEERING BRIEF｜Lean Logistics · Pull System · JIT</text>
