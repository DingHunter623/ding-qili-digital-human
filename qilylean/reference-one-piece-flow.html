  <script>
  (function(){
    'use strict';
    var key=new TextEncoder().encode('QilyLeanFlowPreview2026');
    function decode(buffer){var bytes=new Uint8Array(buffer);for(var i=0;i<bytes.length;i++)bytes[i]^=key[i%key.length];return bytes;}
    async function loadPage(canvas){
      if(canvas.dataset.loaded==='1'||canvas.dataset.loading==='1')return;
      canvas.dataset.loading='1';
      var figure=canvas.closest('.page'),loading=figure.querySelector('.page-loading');
      try{
        var response=await fetch(canvas.dataset.src,{cache:'force-cache',credentials:'same-origin',referrerPolicy:'no-referrer'});
        if(!response.ok)throw new Error('page');
        var blob=new Blob([decode(await response.arrayBuffer())],{type:'image/jpeg'});
        var bitmap=await createImageBitmap(blob);
        canvas.width=bitmap.width;canvas.height=bitmap.height;
        canvas.getContext('2d',{alpha:false}).drawImage(bitmap,0,0);
        bitmap.close();canvas.dataset.loaded='1';loading.remove();
      }catch(error){loading.textContent='本页加载失败，请刷新后重试。';}
      canvas.dataset.loading='0';
    }
    var pages=Array.from(document.querySelectorAll('canvas[data-src]'));
    if('IntersectionObserver' in window){
      var observer=new IntersectionObserver(function(entries){entries.forEach(function(entry){if(entry.isIntersecting){loadPage(entry.target);observer.unobserve(entry.target);}});},{rootMargin:'1200px 0px'});
      pages.forEach(function(page){observer.observe(page);});
    }else pages.forEach(loadPage);
    var block=function(event){event.preventDefault();event.stopPropagation();return false;};
    ['contextmenu','dragstart','selectstart','copy','cut'].forEach(function(name){document.addEventListener(name,block,true);});
    document.addEventListener('keydown',function(event){var k=(event.key||'').toLowerCase();if(event.key==='F12'||((event.ctrlKey||event.metaKey)&&['s','p','u','c','a'].indexOf(k)>-1))block(event);},true);
    try{window.print=function(){return false;};}catch(error){}
  })();
  </script>
