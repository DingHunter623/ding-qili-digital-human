<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-labelledby="title desc">
<title id="title">计划不是填满产能，而是保护交付节奏</title><desc id="desc">围绕订单优先级、物料齐套、标准工时和产能负荷形成可靠排程</desc>
<defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0f4b5a"/><stop offset="1" stop-color="#177f87"/></linearGradient></defs>
<rect width="1000" height="1000" rx="42" fill="url(#bg)"/>
<text x="70" y="88" fill="#ffe39b" font-size="34" font-weight="800">2026-07-15｜DAY008</text>
<text x="70" y="176" fill="#fff" font-size="58" font-weight="900">计划不是填满产能</text>
<text x="70" y="246" fill="#fff" font-size="58" font-weight="900">而是保护交付节奏</text>
<text x="70" y="306" fill="#d8efeb" font-size="27">订单优先级 · 物料齐套 · 标准工时 · 产能负荷</text>
<g transform="translate(90 390)">
<rect width="820" height="420" rx="28" fill="#f7fbfa"/>
<line x1="95" y1="90" x2="725" y2="90" stroke="#d5e4e3" stroke-width="8" stroke-linecap="round"/>
<circle cx="130" cy="90" r="48" fill="#caa15f"/><circle cx="335" cy="90" r="48" fill="#7d4a70"/><circle cx="540" cy="90" r="48" fill="#177f87"/><circle cx="745" cy="90" r="48" fill="#caa15f"/>
<g fill="#fff" font-size="26" font-weight="900" text-anchor="middle"><text x="130" y="99">订单</text><text x="335" y="99">物料</text><text x="540" y="99">工时</text><text x="745" y="99">产能</text></g>
<g fill="#173c45" font-size="30" font-weight="850" text-anchor="middle"><text x="130" y="180">明确优先级</text><text x="335" y="180">确认齐套率</text><text x="540" y="180">统一口径</text><text x="745" y="180">识别瓶颈</text></g>
<path d="M120 290 C260 250 360 335 490 285 S720 250 785 300" fill="none" stroke="#177f87" stroke-width="16" stroke-linecap="round"/>
<line x1="120" y1="338" x2="785" y2="338" stroke="#caa15f" stroke-width="8" stroke-dasharray="20 16"/>
<text x="410" y="390" fill="#0f4b5a" font-size="38" font-weight="900" text-anchor="middle">排程的目标：稳定交付，而非表面满负荷</text>
</g>
<text x="500" y="900" fill="#fff" font-size="31" font-weight="850" text-anchor="middle">计划可执行，现场才有节奏；数据可信，交付才有保障。</text>
<text x="500" y="955" fill="#d8efeb" font-size="23" font-weight="800" text-anchor="middle">每日工程版简报</text>
</svg>