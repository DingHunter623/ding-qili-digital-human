<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#12343d"/><stop offset="1" stop-color="#176b77"/></linearGradient></defs><rect width="1200" height="675" fill="url(#g)"/><text x="70" y="110" fill="#fff" font-family="Arial,Microsoft YaHei,sans-serif" font-size="48" font-weight="800">效率提升，不是让设备跑得更快</text><text x="70" y="175" fill="#ffd36a" font-family="Arial,Microsoft YaHei,sans-serif" font-size="44" font-weight="900">而是减少设备等待</text><rect x="70" y="235" width="650" height="330" rx="24" fill="#f4f9f8"/><text x="105" y="290" fill="#14515c" font-family="Arial,Microsoft YaHei,sans-serif" font-size="26" font-weight="800">OEE = 开动率 × 性能效率 × 质量率</text><circle cx="220" cy="420" r="100" fill="none" stroke="#d4e8e6" stroke-width="24"/><circle cx="220" cy="420" r="100" fill="none" stroke="#1b8a83" stroke-width="24" stroke-linecap="round" stroke-dasharray="500 628" transform="rotate(-90 220 420)"/><text x="220" y="430" text-anchor="middle" fill="#14515c" font-family="Arial" font-size="52" font-weight="900">80%</text><g font-family="Arial,Microsoft YaHei,sans-serif" font-size="23" font-weight="800" fill="#14515c"><rect x="375" y="345" width="290" height="54" rx="12" fill="#dceeed"/><text x="400" y="380">Availability 开动率</text><rect x="375" y="415" width="290" height="54" rx="12" fill="#dceeed"/><text x="400" y="450">Performance 性能效率</text><rect x="375" y="485" width="290" height="54" rx="12" fill="#dceeed"/><text x="400" y="520">Quality 质量率</text></g><rect x="760" y="235" width="370" height="330" rx="24" fill="#0d2830"/><text x="795" y="290" fill="#fff" font-family="Arial,Microsoft YaHei,sans-serif" font-size="26" font-weight="800">先消除等待，再谈提速</text><g fill="#ffd36a" font-family="Arial,Microsoft YaHei,sans-serif" font-size="24" font-weight="800"><text x="800" y="355">● 等料　● 等人</text><text x="800" y="410">● 等程序　● 等换型</text><text x="800" y="465">● 等检验　● 等维修</text></g><text x="800" y="525" fill="#d9eeee" font-family="Arial,Microsoft YaHei,sans-serif" font-size="21">TPM · SMED · JIT · FPY</text><text x="70" y="625" fill="#e1f1f0" font-family="Arial,Microsoft YaHei,sans-serif" font-size="24" font-weight="700">优秀的工厂，不是设备一直运转，而是每一分钟都在创造价值。</text></svg>