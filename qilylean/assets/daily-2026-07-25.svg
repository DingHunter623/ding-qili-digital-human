<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
<title id="title">分层过程审核守住现场标准</title><desc id="desc">作业者、班组长、主管和管理层按层级与频次确认关键控制点，形成标准维持闭环</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0b3f4b"/><stop offset="1" stop-color="#177f87"/></linearGradient>
  <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ffe39b"/><stop offset="1" stop-color="#caa15f"/></linearGradient>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#062a32" flood-opacity=".28"/></filter>
</defs>
<rect width="800" height="800" rx="40" fill="url(#bg)"/>
<rect x="180" y="55" width="440" height="48" rx="24" fill="#fff" fill-opacity=".12" stroke="#fff" stroke-opacity=".34"/>
<text x="400" y="87" text-anchor="middle" fill="#d8efeb" font-size="21" font-weight="800" letter-spacing="2">LAYERED PROCESS AUDIT</text>
<text x="400" y="150" text-anchor="middle" fill="#fff" font-size="40" font-weight="900">标准发布 ≠ 稳定执行</text>
<text x="400" y="191" text-anchor="middle" fill="#ffe39b" font-size="25" font-weight="800">关键控制点，要被分层持续确认</text>
<g filter="url(#shadow)">
  <rect x="120" y="245" width="560" height="86" rx="22" fill="#f6fbfa"/>
  <rect x="155" y="350" width="490" height="86" rx="22" fill="#e6f3f0"/>
  <rect x="190" y="455" width="420" height="86" rx="22" fill="#f6fbfa"/>
  <rect x="225" y="560" width="350" height="86" rx="22" fill="#e6f3f0"/>
</g>
<g fill="#caa15f" font-size="19" font-weight="900">
  <text x="148" y="277">04</text><text x="183" y="382">03</text><text x="218" y="487">02</text><text x="253" y="592">01</text>
</g>
<g fill="#0f4b5a" font-weight="900">
  <text x="400" y="283" text-anchor="middle" font-size="29">管理层｜按风险走现场</text>
  <text x="400" y="388" text-anchor="middle" font-size="29">职能 / 主管｜周检与日检</text>
  <text x="400" y="493" text-anchor="middle" font-size="29">班组长｜每班确认</text>
  <text x="400" y="598" text-anchor="middle" font-size="29">作业者｜班前自检</text>
</g>
<circle cx="641" cy="288" r="25" fill="url(#gold)"/><path d="M629 288l9 9 17-21" fill="none" stroke="#17322d" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="606" cy="393" r="25" fill="url(#gold)"/><path d="M594 393l9 9 17-21" fill="none" stroke="#17322d" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="571" cy="498" r="25" fill="url(#gold)"/><path d="M559 498l9 9 17-21" fill="none" stroke="#17322d" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
<circle cx="536" cy="603" r="25" fill="url(#gold)"/><path d="M524 603l9 9 17-21" fill="none" stroke="#17322d" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
<rect x="105" y="688" width="590" height="62" rx="31" fill="#062f38" fill-opacity=".62"/>
<text x="400" y="726" text-anchor="middle" fill="#fff" font-size="23" font-weight="800">风险识别 → 分层确认 → 偏差闭环 → 标准更新</text>
</svg>
