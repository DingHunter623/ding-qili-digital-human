<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>QilyLean｜制造改善与项目实践主页</title>
  <meta name="description" content="QilyLean制造改善与项目实践主页。">
  <style>html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f3faf9}#homeFrame{display:block;width:100%;height:100%;border:0;background:#f3faf9}</style>
</head>
<body>
  <iframe id="homeFrame" src="home.html?build=20260718-mold-video-fix7" title="QilyLean 制造改善与项目实践主页"></iframe>
  <script>
  (function(){
    var frame=document.getElementById('homeFrame');
    frame.addEventListener('load',function(){
      try{
        var doc=frame.contentDocument;
        if(!doc)return;
        if(!doc.getElementById('qilyShareQrFixScript')){
          var shareScript=doc.createElement('script');
          shareScript.id='qilyShareQrFixScript';
          shareScript.src='/qilylean/share-qr-fix.js?v=20260717-qrfix2';
          doc.body.appendChild(shareScript);
        }
        if(!doc.getElementById('qilyProjectImagesV2Script')){
          var projectScript=doc.createElement('script');
          projectScript.id='qilyProjectImagesV2Script';
          projectScript.src='/qilylean/project-images-v2.js?v=20260718-6';
          doc.body.appendChild(projectScript);
        }
        if(!doc.getElementById('qilyMoldVideoScript')){
          var videoScript=doc.createElement('script');
          videoScript.id='qilyMoldVideoScript';
          videoScript.src='/qilylean/project-mold-video.js?v=20260718-7';
          doc.body.appendChild(videoScript);
        }
        if(location.hash)frame.contentWindow.location.hash=location.hash;
      }catch(error){console.error(error);}
    });
  })();
  </script>
</body>
</html>
