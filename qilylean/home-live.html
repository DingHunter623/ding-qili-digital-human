<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>QilyLean｜制造改善与项目实践主页</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f3faf9}
    #homeFrame{display:block;width:100%;height:100%;border:0;background:#f3faf9}
  </style>
</head>
<body>
  <iframe id="homeFrame" src="home.html?build=20260717-project-images-v4" title="QilyLean 制造改善与项目实践主页"></iframe>
  <script>
  (function(){
    const frame=document.getElementById('homeFrame');
    frame.addEventListener('load',function(){
      try{
        const doc=frame.contentDocument;
        if(!doc)return;
        if(!doc.getElementById('projectMediaStableStyle')){
          const style=doc.createElement('style');
          style.id='projectMediaStableStyle';
          style.textContent='.project-media{margin:-22px -22px 18px;overflow:hidden;border-bottom:1px solid var(--line);background:#e8f1ef}.project-media img{display:block;width:100%;aspect-ratio:16/10;object-fit:cover;object-position:center 48%}.project-media figcaption{padding:10px 14px;color:var(--muted);background:#f8fbfa;font-size:14px;line-height:1.55;font-weight:750}.fuse-photo-grid{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line)}.fuse-photo-grid>div{position:relative;overflow:hidden;background:#eef3f5}.fuse-photo-grid img{width:100%;height:250px;object-fit:contain;background:#eef3f5}.fuse-photo-grid span{position:absolute;left:10px;bottom:10px;padding:4px 9px;color:#fff;background:rgba(15,75,90,.88);font-size:13px;font-weight:900}@media(max-width:760px){.project-media img{aspect-ratio:4/3}.fuse-photo-grid{grid-template-columns:1fr}.fuse-photo-grid img{height:220px}}';
          doc.head.appendChild(style);
        }
        const cards=[...doc.querySelectorAll('#projects .project')];
        const mold=cards.find(card=>{const h=card.querySelector('h3');return h&&h.textContent.includes('智能模具库与可追溯管理');});
        if(mold&&!mold.querySelector('.project-media')){
          const fig=doc.createElement('figure');
          fig.className='project-media';
          fig.innerHTML='<img src="/mold-smart-warehouse.png?v=20260717v4" alt="1200+副模具标准化与二维码追溯智能模具立体库"><figcaption>1200+副模具标准化与二维码追溯｜智能模具立体库现场</figcaption>';
          mold.insertBefore(fig,mold.firstChild);
        }
        const fuse=cards.find(card=>{const h=card.querySelector('h3');return h&&(h.textContent.includes('切口工艺改良')||h.textContent.includes('玻璃管保险丝切口断裂率改善'));});
        if(fuse&&!fuse.querySelector('.project-media')){
          const h=fuse.querySelector('h3');if(h)h.textContent='玻璃管保险丝切口断裂率改善';
          const fig=doc.createElement('figure');
          fig.className='project-media';
          fig.innerHTML='<div class="fuse-photo-grid"><div><img src="/%E5%89%AA%E6%96%AD%E4%BF%9D%E9%99%A9%E4%B8%9D%E4%B9%8B%E5%89%8D.jpg?v=20260717v4" alt="玻璃管保险丝切口改善前状态"><span>改善前</span></div><div><img src="/%E5%89%AA%E6%96%AD%E4%BF%9D%E9%99%A9%E4%B8%9D%E5%90%8E.jpg?v=20260717v4" alt="玻璃管保险丝切口改善后状态"><span>改善后</span></div></div><figcaption>玻璃管保险丝切口断裂率改善｜改善前后实物对比</figcaption>';
          fuse.insertBefore(fig,fuse.firstChild);
        }
        if(location.hash==='#projects'){
          const target=doc.getElementById('projects');
          if(target)setTimeout(()=>target.scrollIntoView({block:'start'}),100);
        }
      }catch(e){console.error(e);}
    });
  })();
  </script>
</body>
</html>
