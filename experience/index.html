<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">

  <meta name="description" content="丁启利制造工程、工程管理、精益咨询与数智化工厂推进履历主线。详细内容需输入访问口令。">
  <meta name="robots" content="noindex,follow">
  <link rel="canonical" href="https://qilylean.com/experience/">
  <link rel="stylesheet" href="/site-shell.css?v=20260722-modules-v2">
</head>
<body class="module-page">
  <header class="qily-site-header">
    <a class="qily-brand" href="/">制造改善与项目实践主页</a>
    <nav class="site-nav" aria-label="网站导航">
      <a href="/">首页</a>
      <a href="/capabilities/">能力画像</a>
      <a href="/experience/" aria-current="page">履历主线</a>
      <a href="/projects/">代表项目</a>
      <a href="/improvements/">改善经验</a>
      <a href="/ai.html">QilyLean AI</a>
      <a href="/knowledge/">知识分享</a>
      <a href="/moments.html">行走印记</a>
      <a class="qily-back-link" href="/">← 返回上一层</a>
    </nav>
  </header>

  <main>
    <section class="module-hero">
      <div class="module-inner">
        <span class="module-eyebrow">Career Path / Engineering / Lean Delivery</span>
        <h1>履历主线（加密）</h1>
        <p class="module-lead">本页只承载履历主线。详细职责、项目方法、关键成果与能力递进默认不下载、不渲染，输入访问口令后再单独加载；其他模块仅保留为导航链接。</p>
      </div>
    </section>

    <section class="module-section alt" id="experience">
      <div class="module-inner">
        <div class="experience-lock" id="experienceLock">
          <h2>访问履历主线</h2>
          <p>完整履历包含各阶段职责范围、项目方法、关键成果与能力递进。请输入访问口令后查看。</p>
          <div class="experience-lock-form">
            <input id="experiencePassword" type="password" inputmode="numeric" autocomplete="current-password" aria-label="履历访问口令" placeholder="请输入访问密码">
            <button id="experienceUnlock" type="button">查看完整履历主线</button>
          </div>
          <div class="experience-message" id="experienceMessage" aria-live="polite"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="module-footer"><div class="module-inner"><span>丁启利｜履历主线</span><span>详细内容已加密保护</span></div></footer>
  <script>
    (function () {
      'use strict';
      var password = '259';
      var input = document.getElementById('experiencePassword');
      var button = document.getElementById('experienceUnlock');
      var message = document.getElementById('experienceMessage');
      var loading = false;

      function loadResume() {
        if (loading || document.getElementById('experienceResumeContentScript')) return;
        loading = true;
        message.textContent = '口令正确，正在加载履历主线……';
        try { sessionStorage.setItem('experienceUnlocked', '1'); } catch (error) {}

        var script = document.createElement('script');
        script.id = 'experienceResumeContentScript';
        script.src = '/qilylean/career-resume-full.js?v=20260722-on-demand-v1';
        script.onload = function () { loading = false; };
        script.onerror = function () {
          loading = false;
          message.textContent = '履历内容暂未加载成功，请稍后重试。';
          script.remove();
        };
        document.body.appendChild(script);
      }

      function unlock() {
        if ((input.value || '').trim() === password) {
          loadResume();
          return;
        }
        message.textContent = '密码不正确，请重新输入。';
        input.select();
      }

      button.addEventListener('click', unlock);
      input.addEventListener('keydown', function (event) { if (event.key === 'Enter') unlock(); });
      try { if (sessionStorage.getItem('experienceUnlocked') === '1') loadResume(); } catch (error) {}
    })();
  </script>
  <script src="/site-navigation.js?v=20260722-modules-v2"></script>
  <script src="/homepage-music.js?v=20260722-stable-v2"></script>
</body>
</html>
