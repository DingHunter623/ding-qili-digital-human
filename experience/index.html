  <script>
    (function () {
      'use strict';
      var password = '259';
      var input = document.getElementById('experiencePassword');
      var button = document.getElementById('experienceUnlock');
      var message = document.getElementById('experienceMessage');
      var lock = document.getElementById('experienceLock');
      var content = document.getElementById('experienceContent');
      var template = document.getElementById('experienceTemplate');

      function showContent() {
        if (content.dataset.rendered !== '1') {
          content.appendChild(template.content.cloneNode(true));
          content.dataset.rendered = '1';
        }
        lock.hidden = true;
        content.hidden = false;
        try { sessionStorage.setItem('experienceUnlocked', '1'); } catch (error) {}
        requestAnimationFrame(function () {
          if (typeof content.scrollIntoView === 'function') content.scrollIntoView({ block: 'start' });
        });
      }

      function unlock() {
        if ((input.value || '').trim() === password) {
          showContent();
          return;
        }
        message.textContent = '密码不正确，请重新输入。';
        input.select();
      }

      button.addEventListener('click', unlock);
      input.addEventListener('keydown', function (event) { if (event.key === 'Enter') unlock(); });
      try { if (sessionStorage.getItem('experienceUnlocked') === '1') showContent(); } catch (error) {}
    })();
  </script>
